# Alembic configuration.
#
# NOTE: sqlalchemy.url is deliberately BLANK. The connection string is injected at
# runtime by alembic/env.py from app.core.config, so credentials live only in .env
# and are never committed to version control.

[alembic]
script_location = alembic
prepend_sys_path = .

# Timestamped, descriptive migration filenames:
#   2026_07_19_1430-a1b2c3d4e5f6_add_students_table.py
# Chronological sort order makes the migration history readable at a glance, which
# lexicographic hashes alone do not.
file_template = %%(year)d_%%(month).2d_%%(day).2d_%%(hour).2d%%(minute).2d-%%(rev)s_%%(slug)s

timezone = UTC

sqlalchemy.url =

[post_write_hooks]
# Auto-format generated migrations so they pass CI lint without manual cleanup.
hooks = ruff_format
ruff_format.type = console_scripts
ruff_format.entrypoint = ruff
ruff_format.options = format REVISION_SCRIPT_FILENAME

[loggers]
keys = root,sqlalchemy,alembic

[handlers]
keys = console

[formatters]
keys = generic

[logger_root]
level = WARNING
handlers = console
qualname =

[logger_sqlalchemy]
level = WARNING
handlers =
qualname = sqlalchemy.engine

[logger_alembic]
level = INFO
handlers =
qualname = alembic

[handler_console]
class = StreamHandler
args = (sys.stderr,)
level = NOTSET
formatter = generic

[formatter_generic]
format = %(levelname)-5.5s [%(name)s] %(message)s
datefmt = %H:%M:%S
